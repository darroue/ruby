version: "3"

services:
  production:
    build:
      context: .
      args:
        image: ruby:$version
        packages: ${packages_production}
    image: darroue/ruby:$version-production
    depends_on:
      - development

  development:
    build:
      context: .
      args:
        image: ruby:$version
        packages: ${packages_development}
    image: darroue/ruby:$version-development
